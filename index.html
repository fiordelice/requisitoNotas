<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Requisições de Notas</title>
<style>
body, html { margin:0; padding:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f0f2f5; }
.wrap { display:flex; flex-wrap: wrap; justify-content: center; padding:30px; gap:25px; }

/* Cards */
.card { background:#fff; border: 1px solid rgba(0,0,0,0.15); padding:25px; border-radius:15px; box-shadow:0 6px 15px rgba(0,0,0,0.1); flex:1 1 320px; max-width:400px; transition: transform 0.2s; }
.card:hover { transform: translateY(-3px); }
h1, h2 { margin-top:0; color:#333; }

/* Formulário */
form input, form textarea, form button { width:100%; margin-bottom:12px; padding:10px; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; font-size:0.95em; }
form input:focus, form textarea:focus { border-color:#4CAF50; outline:none; }
form button {background:#5f01ca; color:#fff; border:none; cursor:pointer; font-weight:bold; transition: background 0.2s; }
form button:hover { background:#5a2edb; }

.actions { 
  display:flex; 
  gap:10px; 
  margin-top:8px; 
  width:100%; 
  align-items: center; /* centraliza verticalmente todos os botões */
}

.actions button.concluir { 
  background:#45a049; 
  color:#fff; 
  flex:1; 
  height:40px;
}


form input[type="date"] {
  display: block;
  margin: 0 auto 12px auto; /* centraliza em qualquer largura */
  text-align: center;       /* centraliza o texto dentro do input */
  max-width: 250px;         /* largura fixa mais elegante */
}


/* Lista de itens */
.list { margin-top:15px; }
.item { 
  display:flex; 
  flex-direction: column; 
  align-items: flex-start; 
  padding:12px 10px; 
  border-bottom:1px solid #eee; 
  border-radius:8px; 
  margin-bottom:8px; 
  background:#fafafa; 
}
.item div { margin-bottom:4px; }
.item .numeroPeca { font-weight:bold; }
.item .solicitante { color:#555; font-size:0.9em; }
.item .descricao, .item .conclusao { font-size:0.88em; color:#555; }

/* Botões de ação */
.actions { display:flex; gap:10px; margin-top:8px; width:100%; align-items: center; }
.actions button { padding:8px 12px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; display:flex; align-items:center; justify-content:center; transition: background 0.2s, transform 0.1s; }
.actions button.concluir { background:#45a049; color:#fff; flex:1; }
.actions button.concluir:hover { background:#45a049fa; transform: translateY(-1px); }
.actions button.excluir { background:#e60000; color:#fff; display:flex; align-items:center; justify-content:center; flex:none; padding:8px 12px; }
.actions button.excluir:hover { background:#e60000c4; transform: translateY(-1px); }
.actions button.excluir::before { content:  "🗑️"; display:flex; justify-content:center; align-items:center; }
.actions.concluidas button.excluir { padding:6px 8px; font-size:0.85em; }

/* Diferenciar cards de listas */
.card:nth-of-type(2) { border-top:4px solid #2196F3; }
.card:nth-of-type(3) { border-top:4px solid #4CAF50; }

/* Responsividade */
@media(max-width:650px){
  .wrap { display:flex; flex-direction: column; align-items: center; width:100%; gap:20px; padding:20px; }
  .card { flex:none; width:100%; max-width:400px; }
  .actions { flex-direction: row; gap:10px; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Nova Requisição</h1>
    <form id="reqForm">
      <input type="text" id="numero" placeholder="Número da Nota" required>
      <input type="text" id="peca" placeholder="Nome da Peça" required>
      <input type="text" id="solicitante" placeholder="Solicitante" required>
      <textarea id="descricao" placeholder="Descrição / Observações"></textarea>
      <label>Data de Conclusão:</label>
      <input type="date" id="conclusao" required>
      <button type="submit">Salvar</button>
    </form>
  </div>

  <div class="card">
    <h2>Pendentes</h2>
    <div class="list" id="lista"></div>
  </div>

  <div class="card">
    <h2>Concluídas</h2>
    <div class="list" id="listaConcluidas"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDpn0G_htWaLgRWDg1KWli4ar_33dLpYdw",
  authDomain: "raizen-d4d1c.firebaseapp.com",
  databaseURL: "https://raizen-d4d1c-default-rtdb.firebaseio.com",
  projectId: "raizen-d4d1c",
  storageBucket: "raizen-d4d1c.appspot.com",
  messagingSenderId: "200981730496",
  appId: "1:200981730496:web:736a8b4ddaf371ea6e0925"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const form = document.getElementById("reqForm");
const lista = document.getElementById("lista");
const listaConcluidas = document.getElementById("listaConcluidas");

function salvarFirebase(data){
  const ref = db.ref('requisicoes_demo').push();
  ref.set({...data, id: ref.key});
}

async function buscarPendentes(){
  const snap = await db.ref('requisicoes_demo').get();
  return snap.exists()? Object.entries(snap.val()).map(([id,val])=>({id,...val})) : [];
}

async function buscarConcluidas(){
  const snap = await db.ref('requisicoes_concluidas').get();
  return snap.exists()? Object.entries(snap.val()).map(([id,val])=>({id,...val})) : [];
}

function concluirFirebase(id){
  db.ref('requisicoes_demo/' + id).get().then(snapshot => {
    if (!snapshot.exists()) return;
    const item = snapshot.val();
    db.ref('requisicoes_concluidas/' + id).set(item).then(() => {
      db.ref('requisicoes_demo/' + id).remove().then(() => {
        alert("✅ Requisição concluída!");
        carregarListas();
      });
    });
  });
}

function excluirFirebase(id){
  db.ref('requisicoes_demo/'+id).remove().then(()=>{
    alert("🗑️ Requisição pendente excluída!");
    carregarListas();
  });
}

function excluirConcluidaFirebase(id){
  db.ref('requisicoes_concluidas/'+id).remove().then(()=>{
    alert("🗑️ Requisição concluída excluída!");
    carregarListas();
  });
}

async function carregarListas(){
  const pendentes = await buscarPendentes();
  lista.innerHTML = "";
  const hoje = new Date().toISOString().split("T")[0];
  for(let r of pendentes){
    if(r.conclusao <= hoje){ concluirFirebase(r.id); continue; }
    const div = document.createElement("div");
    div.className="item";
    div.innerHTML=`<div class="numeroPeca">${r.numero} - ${r.peca}</div>
      <div class="solicitante">${r.solicitante} | ${r.criado_em}</div>
      <div class="conclusao">Concluir até: ${r.conclusao}</div>
      <div class="actions">
        <button class="concluir" onclick='concluirFirebase("${r.id}")'>Concluir</button>
        <button class="excluir" onclick='excluirFirebase("${r.id}")'></button>
      </div>`;
    lista.appendChild(div);
  }

  const concluidas = await buscarConcluidas();
  listaConcluidas.innerHTML = "";
  for(let r of concluidas){
    const div = document.createElement("div");
    div.className="item";
    div.innerHTML=`<div class="numeroPeca">${r.numero} - ${r.peca}</div>
      <div class="solicitante">${r.solicitante} | ${r.criado_em}</div>
      <div class="conclusao">Concluído até: ${r.conclusao}</div>
      <div class="actions concluidas">
        <button class="excluir" onclick='excluirConcluidaFirebase("${r.id}")'></button>
      </div>`;
    listaConcluidas.appendChild(div);
  }
}

form.addEventListener("submit", e=>{
  e.preventDefault();
  const data={
    numero:document.getElementById("numero").value,
    peca:document.getElementById("peca").value,
    solicitante:document.getElementById("solicitante").value,
    descricao:document.getElementById("descricao").value,
    conclusao:document.getElementById("conclusao").value,
    criado_em:new Date().toLocaleString()
  };
  salvarFirebase(data);
  alert("✅ Requisição cadastrada!");
  form.reset();
  carregarListas();
});

carregarListas();
setInterval(carregarListas,60000);
</script>
</body>
</html>
